<!-- templates/forgot_password.html -->

{% extends "base.html" %}
{% load static %}

{% block title %}Forgot Password{% endblock %}

{% block content %}

<style>
.wrapper{
    min-height:88vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:500px;
    background:#fff;
    border-radius:16px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-control{
    height:46px;
    border-radius:8px;
}

.btn-danger{
    height:46px;
    border-radius:8px;
    font-weight:600;
}
</style>

<div class="wrapper">

<div class="box">

<h3 class="mb-4 text-center fw-bold">
<i class="fa-solid fa-key me-2"></i>
Forgot Password
</h3>

{% if messages %}
{% for message in messages %}
<div class="alert alert-{{message.tags}}">
{{message}}
</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>New Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<button type="submit" class="btn btn-danger w-100">
Reset Password
</button>

<div class="text-center mt-3">
<a href="{% url 'admin_login' %}" class="text-success text-decoration-none">
Back To Login
</a>
</div>

</form>

</div>
</div>

{% endblock %}
